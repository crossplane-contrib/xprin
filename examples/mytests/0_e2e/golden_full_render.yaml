---
apiVersion: aws.example.com/v1
kind: XAWSInfrastructure
metadata:
  labels:
    app: myplatform
    environment: staging
  name: platform-aws
spec:
  dbUsername: admin
  region: us-west-2
  sshPublicKey: qa_ssh_key
  team: devops
  vpcId: vpc-12345678
status:
  conditions:
  - lastTransitionTime: "2024-01-01T00:00:00Z"
    message: 'Unready resources: ec2, rds, and secondary-ec2'
    reason: Creating
    status: "False"
    type: Ready
  securityGroupId: sg-1234567890
---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: Instance
metadata:
  annotations:
    crossplane.io/composition-resource-name: ec2
  generateName: platform-aws-
  labels:
    app: platform-aws
    crossplane.io/composite: platform-aws
    environment: staging
  name: platform-aws-primary-ec2
  ownerReferences:
  - apiVersion: aws.example.com/v1
    blockOwnerDeletion: true
    controller: true
    kind: XAWSInfrastructure
    name: platform-aws
    uid: ""
spec:
  forProvider:
    ami: ami-0c02fb55956c7d316
    instanceType: t2.micro
    keyName: qa_ssh_key
    region: us-west-2
    vpcSecurityGroupIds:
    - sg-1234567890
---
apiVersion: rds.aws.upbound.io/v1beta1
kind: Cluster
metadata:
  annotations:
    crossplane.io/composition-resource-name: rds
  generateName: platform-aws-
  labels:
    crossplane.io/composite: platform-aws
  name: platform-aws-rds
  ownerReferences:
  - apiVersion: aws.example.com/v1
    blockOwnerDeletion: true
    controller: true
    kind: XAWSInfrastructure
    name: platform-aws
    uid: ""
spec:
  forProvider:
    backupRetentionPeriod: 1
    engine: aurora-postgresql
    engineVersion: "15.4"
    masterPasswordSecretRef:
      key: password
      name: platform-aws-rds-password
      namespace: crossplane-system
    masterUsername: admin
    preferredBackupWindow: 07:00-09:00
    preferredMaintenanceWindow: sun:09:00-sun:11:00
    region: us-west-2
    vpcSecurityGroupIds:
    - sg-1234567890
---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: Instance
metadata:
  annotations:
    crossplane.io/composition-resource-name: secondary-ec2
  generateName: platform-aws-
  labels:
    app: platform-aws
    crossplane.io/composite: platform-aws
    environment: staging
  name: platform-aws-secondary-ec2
  ownerReferences:
  - apiVersion: aws.example.com/v1
    blockOwnerDeletion: true
    controller: true
    kind: XAWSInfrastructure
    name: platform-aws
    uid: ""
spec:
  forProvider:
    ami: ami-0c02fb55956c7d316
    instanceType: t3.medium
    keyName: qa_ssh_key
    region: us-west-2
    vpcSecurityGroupIds:
    - sg-1234567890
---
apiVersion: ec2.aws.upbound.io/v1beta1
kind: SecurityGroup
metadata:
  annotations:
    crossplane.io/composition-resource-name: sg
  generateName: platform-aws-
  labels:
    crossplane.io/composite: platform-aws
  name: platform-aws-sg
  ownerReferences:
  - apiVersion: aws.example.com/v1
    blockOwnerDeletion: true
    controller: true
    kind: XAWSInfrastructure
    name: platform-aws
    uid: ""
spec:
  forProvider:
    description: Security group for platform-aws
    region: us-west-2
