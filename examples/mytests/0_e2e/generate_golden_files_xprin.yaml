tests:
- name: "Generate golden files"
  patches:
    xrd: ../../aws/xrd.yaml
  inputs:
    xr: ../../aws/xr.yaml
    composition: ../../aws/composition.yaml
    functions: ../../aws/functions.yaml
    observed-resources: ../../aws/observed
  hooks:
    post-test:
    - run: cp "{{ .Outputs.Render }}" ../6_assertions/golden_full_render.yaml
    - run: cp "{{ index .Outputs.Rendered "Cluster/platform-aws-rds" }}" ../6_assertions/golden_single_resource.yaml
