tests:
- name: "Second reconciliation loop"
  patches:
    xrd: ../../aws/xrd.yaml
  inputs:
    xr: ../../aws/xr.yaml
    composition: ../../aws/composition.yaml
    functions: ../../aws/functions.yaml
    observed-resources: ../../aws/observed
    crds:
    - ../../aws/xrd.yaml
    - ../../aws/crossplane.yaml
  hooks:
    pre-test:
    - run: echo "Running pre-test hook"
    post-test:
    - run: echo "Running post-test hook"

  assertions:
    xprin:
    ##########################################
    ###### Exact resource name matching ######
    ##########################################

    # Count assertion
    - name: "Number of resources"
      type: "Count"
      value: 5

    - name: "SecurityGroup should exist"
      type: "Count"
      value: 1
      resource: "SecurityGroup/platform-aws-sg"   # 'resource' field is optional for count asssertions

    - name: "EC2 should not exist"
      type: "Count"
      value: 0
      resource: "EC2/platform-aws-ec2"            # 'resource' field is optional for count asssertions

    # Exists assertions
    - name: "SecurityGroup should exist"
      type: "Exists"
      resource: "SecurityGroup/platform-aws-sg"
    - name: "RDS should exist"
      type: "Exists"
      resource: "Cluster/platform-aws-rds"

    # NotExists assertions
    - name: "EC2 should not exist"
      type: "NotExists"
      resource: "EC2/platform-aws-ec2"
    - name: "No EC2 instances should exist"
      type: "NotExists"
      resource: "EC2"

    # FieldExists assertion
    - name: "SecurityGroup should have a name"
      type: "FieldExists"
      resource: "SecurityGroup/platform-aws-sg"
      field: "metadata.name"

    # FieldNotExists assertion
    - name: "RDS should not have deprecated field"
      type: "FieldNotExists"
      resource: "Cluster/platform-aws-rds"
      field: "spec.deprecatedField"

    # FieldType assertions - all supported types
    - name: "SecurityGroup description should be string"
      type: "FieldType"
      resource: "SecurityGroup/platform-aws-sg"
      field: "spec.forProvider.description"
      value: "string"

    - name: "RDS backupRetentionPeriod should be number"
      type: "FieldType"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.backupRetentionPeriod"
      value: "number"

    - name: "RDS vpcSecurityGroupIds should be array"
      type: "FieldType"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.vpcSecurityGroupIds"
      value: "array"

    - name: "SecurityGroup metadata labels should be object"
      type: "FieldType"
      resource: "SecurityGroup/platform-aws-sg"
      field: "metadata.labels"
      value: "object"

    - name: "RDS masterPasswordSecretRef should be object"
      type: "FieldType"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.masterPasswordSecretRef"
      value: "object"

    - name: "RDS finalSnapshotIdentifier should not exist"
      type: "FieldNotExists"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.finalSnapshotIdentifier"

    # FieldValue assertions
    - name: "RDS should be Aurora PostgreSQL"
      type: "FieldValue"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.engine"
      operator: "is"
      value: "aurora-postgresql"

    - name: "RDS backupRetentionPeriod should equal 1"
      type: "FieldValue"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.backupRetentionPeriod"
      operator: "=="
      value: 1


    #############################################
    ###### Pattern matching resource names ######
    #############################################

    # Count assertions
    - name: "Number of resources"
      type: "Count"
      value: 5
      resource: "*/*"                             # Match all Kind/Name combinations(Same effect as just omitting the 'resource' field)

    - name: "Two EC2 instances should exist"
      type: "Count"
      value: 2
      resource: "Instance/*"                      # Match Instance kind with any name

    - name: "CloudFront should not exist"
      type: "Count"
      value: 0
      resource: "CloudFront/*"                    # No CloudFront resources should exist

    # FieldExists assertion    
    - name: "All EC2 instances should have 'app' label"
      type: "FieldExists"
      resource: "Instance/*"                      # Match all Instances          
      field: "metadata.labels.app"

    # FieldNotExists assertion
    - name: "RDS should not have deprecated field"
      type: "FieldNotExists"
      resource: "Cluster/platform-*-rds"          # Match an undeterministic name
      field: "spec.deprecatedField"

    # Field value
    - name: "One EC2 should be t2.micro"
      type: "FieldValue"
      resource: "Instance/*-primary-ec2"          # Match Instance with a specific name suffix
      field: "spec.forProvider.instanceType"
      operator: "=="
      value: "t2.micro"

    - name: "Other EC2 instance should be t3.medium"
      type: "FieldValue"
      resource: "Instance/*-secondary-ec2"        # Match Instance with a specific name suffix
      field: "spec.forProvider.instanceType"
      operator: "=="
      value: "t3.medium"
  
    # FieldType assertion
    - name: "RDS backupRetentionPeriod for all clusters should be number"
      type: "FieldType"
      resource: "Cluster/*"
      field: "spec.forProvider.backupRetentionPeriod"
      value: "number"