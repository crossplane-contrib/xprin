tests:
- name: "Second reconciliation loop"
  patches:
    xrd: ../../aws/xrd.yaml
  inputs:
    xr: ../../aws/xr.yaml
    composition: ../../aws/composition.yaml
    functions: ../../aws/functions.yaml
    observed-resources: ../../aws/observed

  assertions:
    xprin:
    # Count assertion
    - name: "Number of all rendered resources (including XR)"
      type: "Count"
      value: 3
    # optional 'resource' field
    - name: "Exactly 1 resource of a certain Kind/Name should exist"
      type: "Count"
      value: 1
      resource: "SecurityGroup/platform-aws-sg"   
    - name: "Exactly 0 resources of a certain Kind/Name (basically - resource should not exist)"
      type: "Count"
      value: 0
      resource: "EC2/platform-aws-ec2"            

    # Exists assertions
    - name: "At least 1 SecurityGroup should exist"
      type: "Exists"
      resource: "SecurityGroup"
    - name: "RDS cluster named platform-aws-rds should exist"
      type: "Exists"
      resource: "Cluster/platform-aws-rds"

    # NotExists assertions
    - name: "EC2 with a certain name should not exist"
      type: "NotExists"
      resource: "EC2/platform-aws-ec2"
    - name: "No EC2 instances should exist"
      type: "NotExists"
      resource: "EC2"

    # FieldExists assertion
    - name: "SecurityGroup should have a name"
      type: "FieldExists"
      resource: "SecurityGroup/platform-aws-sg"
      field: "metadata.name"

    # FieldNotExists assertion
    - name: "RDS should not have deprecated field"
      type: "FieldNotExists"
      resource: "Cluster/platform-aws-rds"
      field: "spec.deprecatedField"

    # FieldType assertions - all supported types
    - name: "SecurityGroup description should be string"
      type: "FieldType"
      resource: "SecurityGroup/platform-aws-sg"
      field: "spec.forProvider.description"
      value: "string"

    - name: "RDS backupRetentionPeriod should be number"
      type: "FieldType"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.backupRetentionPeriod"
      value: "number"

    - name: "RDS vpcSecurityGroupIds should be array"
      type: "FieldType"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.vpcSecurityGroupIds"
      value: "array"

    - name: "SecurityGroup metadata labels should be object"
      type: "FieldType"
      resource: "SecurityGroup/platform-aws-sg"
      field: "metadata.labels"
      value: "object"

    - name: "RDS masterPasswordSecretRef should be object"
      type: "FieldType"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.masterPasswordSecretRef"
      value: "object"

    - name: "RDS storageEncrypted should be boolean"
      type: "FieldType"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.storageEncrypted"
      value: "boolean"

    - name: "XR optionalNote should be null"
      type: "FieldType"
      resource: "XAWSInfrastructure/platform-aws"
      field: "spec.optionalNote"
      value: "null"

    # FieldValue assertions
    - name: "RDS should be Aurora PostgreSQL"
      type: "FieldValue"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.engine"
      operator: "is"
      value: "aurora-postgresql"

    - name: "RDS backupRetentionPeriod should equal 1"
      type: "FieldValue"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.backupRetentionPeriod"
      operator: "=="
      value: 1
