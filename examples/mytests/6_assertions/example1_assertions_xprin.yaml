tests:
- name: "Second reconciliation loop"
  patches:
    xrd: ../../aws/xrd.yaml
  inputs:
    xr: ../../aws/xr.yaml
    composition: ../../aws/composition.yaml
    functions: ../../aws/functions.yaml
    observed-resources: ../../aws/observed
    crds:
    - ../../aws/xrd.yaml
    - ../../aws/crossplane.yaml
  hooks:
    pre-test:
    - run: echo "Running pre-test hook"
    post-test:
    - run: echo "Running post-test hook"

  assertions:
    xprin:
    # Count assertion (optional 'resource' field: when omitted, counts all rendered resources)
    - name: "Exact count of all resources of all types"
      type: "Count"
      value: 5

    - name: "Exactly 1 resource of a certain Kind/Name should exist"
      type: "Count"
      value: 1
      resource: "SecurityGroup/platform-aws-sg"

    - name: "Exactly 0 resources of a certain Kind/Name (resource should not exist)"
      type: "Count"
      value: 0
      resource: "EC2/platform-aws-ec2"

    # Same effect as omitting the 'resource' field: count all resources
    - name: "Exact count of all resources of all types (using a pattern)"
      type: "Count"
      value: 5
      resource: "*/*"                             # Match all Kind/Name combinations

    - name: "Exactly 2 Instance resources with '-ec2' suffix should exist"
      type: "Count"
      value: 2
      resource: "Instance/*-ec2"
                      

    # Exists assertions
    - name: "SecurityGroup should exist"
      type: "Exists"
      resource: "SecurityGroup/platform-aws-sg"
    - name: "RDS should exist"
      type: "Exists"
      resource: "Cluster/platform-aws-rds"

    # NotExists assertions
    - name: "EC2 should not exist"
      type: "NotExists"
      resource: "EC2/platform-aws-ec2"
    - name: "No EC2 instances should exist"
      type: "NotExists"
      resource: "EC2"

    # FieldExists assertion
    - name: "SecurityGroup should have a name"
      type: "FieldExists"
      resource: "SecurityGroup/platform-aws-sg"
      field: "metadata.name"
    - name: "All resources should have a name set"
      type: "FieldExists"
      resource: "*/*"                                     # Match all resources (including the XR)
      field: "metadata.name"

    # FieldNotExists assertion
    - name: "RDS should not have deprecated field"
      type: "FieldNotExists"
      resource: "Cluster/platform-aws-rds"
      field: "spec.deprecatedField"

    - name: "RDS of a certain name pattern should not have deprecated field"
      type: "FieldNotExists"
      resource: "Cluster/platform-*-rds"                  # Match resources with unpredictable names
      field: "spec.deprecatedField"

    # FieldType assertions - all supported types
    - name: "SecurityGroup description should be string"
      type: "FieldType"
      resource: "SecurityGroup/platform-aws-sg"
      field: "spec.forProvider.description"
      value: "string"

    - name: "RDS backupRetentionPeriod should be number"
      type: "FieldType"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.backupRetentionPeriod"
      value: "number"

    - name: "RDS vpcSecurityGroupIds should be array"
      type: "FieldType"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.vpcSecurityGroupIds"
      value: "array"

    - name: "SecurityGroup metadata labels should be object"
      type: "FieldType"
      resource: "SecurityGroup/platform-aws-sg"
      field: "metadata.labels"
      value: "object"

    - name: "RDS masterPasswordSecretRef should be object"
      type: "FieldType"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.masterPasswordSecretRef"
      value: "object"

    - name: "RDS finalSnapshotIdentifier should not exist"
      type: "FieldNotExists"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.finalSnapshotIdentifier"

    - name: "RDS backupRetentionPeriod for all clusters should be number"
      type: "FieldType"
      resource: "Cluster/*"
      field: "spec.forProvider.backupRetentionPeriod"
      value: "number"

    # FieldValue assertions
    - name: "RDS should be Aurora PostgreSQL"
      type: "FieldValue"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.engine"
      operator: "is"
      value: "aurora-postgresql"

    - name: "RDS backupRetentionPeriod should equal 1"
      type: "FieldValue"
      resource: "Cluster/platform-aws-rds"
      field: "spec.forProvider.backupRetentionPeriod"
      operator: "=="
      value: 1

    - name: "Instance resources with '-primary-ec2' suffix should be 't2.micro'"
      type: "FieldValue"
      resource: "Instance/*-primary-ec2"                  
      field: "spec.forProvider.instanceType"
      operator: "=="
      value: "t2.micro"